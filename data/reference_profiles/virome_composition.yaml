# ViroForge reference composition profile
# =========================================
# Literature-derived EXPECTATIONS for the viral composition of each collection,
# used by scripts/evaluate_composition.py to score the curated database against
# biological reality. Expectations are semi-quantitative, so every target is a
# BAND (low / expected / high), not a point value. Bands are expert-set from the
# verified per-site dossiers (validation/dossiers/*.json) and each carries `cite`
# keys into docs/composition_references.bib (all identifiers confirmed via
# /verify-references; see validation/VERIFICATION_SUMMARY.md).
#
# TUNING-DIAL
#   strictness  (global)  scales every band's half-width. 1.0 = bands as written;
#               >1 narrows them (stricter, more flags); <1 widens them (looser).
#   Per-target bands are user-editable; edit against the cited evidence.
#
# METRIC DEFINITIONS (all abundance-weighted, on the CLASSIFIED fraction)
#   phage_fraction   phage / (phage + eukaryotic), families mapped to a host via
#                    ICTV VMR. Unknown-host genomes excluded (judged separately).
#   rna_fraction     RNA / (DNA + RNA + RT).
#   signature_taxa   families literature says should be present; role `dominant`
#                    also requires a top-3 abundance rank.
#   max_unknown_family  DATA-QUALITY ceiling on unknown-family abundance (a
#                    curation/taxonomy-coverage metric, not biology).

strictness: 1.0

sites:
  1:
    name: Gut Virome - Adult Healthy (Western Diet)
    expected:
      phage_fraction: {low: 0.80, expected: 0.92, high: 0.98, cite: [pargin2023, van2021]}
      rna_fraction:   {low: 0.00, expected: 0.02, high: 0.10, cite: [pargin2023]}
      signature_taxa:
        - {family: Suoliviridae, role: dominant, cite: [pargin2023]}   # crAss-like / Crassvirales
        - {family: Microviridae, role: present, cite: [pargin2023]}
      max_unknown_family: {high: 0.20, cite: [pargin2023]}

